<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="myWatch">
    <div>
      <div id="hour">11</div>
      <div id="colone">:</div>
      <div id="minute">47</div>
      <div>
        <div id="second">31</div>
        <div id="m">AM</div>
      </div>
    </div>
    <div>
      <div id="day">Friday</div>
      <div id="month">May</div>
      <div id="date">15</div>
    </div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
